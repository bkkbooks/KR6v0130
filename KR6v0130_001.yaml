body:
  text: 漢文大藏經研究要重視文獻價值的判別中華書局熊國禎漢文大藏經是佛教典籍的資料總匯是東方文明的發展記録既是民族文化遺産的珍貴結晶也是國際文化交流的歷史見證其卷帙之浩繁內容之豐富門類之齊全傳播之久遠都是其他許多文獻資料難以比擬的漢文大藏經的研究可以從多方面展開僅總體研究就可以有翻譯史的角度有編纂史的角度有印刷史的角度有目録學史的角度有版本學史的角度有傳播學史的角度等若從藏經內容的綜合分析來講研究的方式和角度就更加豐富多彩難以簡單概括了這許許多多的研究各有其特定的意義和作用但從研究使用的角度看漢文大藏經作為歷史文獻資料其核心價值首先在於文本是否真實可靠準確無誤除了少數疑偽經論存在考證鑒別問題外大多數佛教典籍是流傳有緒無可懷疑的因此各個版別的漢文大藏經的文字校勘質量如何應是評價其優劣的關鍵所在漢文大藏經的研究和評價應當著重其文獻資料價值這是基礎的核心的價值判別不抓住這一關鍵有時就會誤入歧途事倍功半在年發表的關於高僧傳的校勘底本一文中我曾著重對所謂通行本與校刻精良的校勘底本之間的區別加以説明我認為在校勘工作中通行本與校勘底本是有原則區別的通行本是以其在社會上廣泛流行為特色而校勘底本則必須是校印精良文字可靠的本子作為通行本的大正藏不具備充當校勘底本的條件大正藏是世界上目前流行最為廣泛的一種漢文大藏經與多種老式的卷帙浩繁的木刻線裝本大藏經相比較由於它是小字密行一面多欄鉛字排印近代裝幀因此體積較小册數集中是一種容易收藏又便利使用的通行版本問世以後曾多次印刷在促進漢文大藏經在世界範圍內廣泛流通上其功不可沒因為它集中在短短十來年的時間內排印了數量空前繁劇的漢文佛教經典其匆忙迫促可知其排校質量實難保證訛脫衍倒所在多有據以校勘實不足憑據以治史亦應參證核實避免以訛傳訛前輩學者著名佛教史專家周叔迦先生在大藏經雕印源流紀略一文中曾明確指出大正藏的不足所惜錯字錯句頗多收取續藏經中名著亦不完備分類方法尚欠斟酌是其缺點三項缺點錯字錯句頗多是擺在首要地位的從頗多一語也可見其批評的份量之重儘管對大正藏存在以上批評意見已有很長時間了一般讀者仍然貪戀于大正藏的價格低廉取閲便捷直到今天新編的大藏經索引仍然是以大正藏為底本的可見習慣勢力之頑強可怕革故鼎新是多麼困難看來在更為精善好用的新版大藏經問世之前大正藏的通行本地位恐怕是難以動搖或替代的對於新版漢文大藏經的編纂人們期望它資料齊全編排科學使用方便這是合乎情理的在信息化時代在數碼化和光電技術高度發展的新印刷時代搜羅尋訪資料編制目録索引録入復製刻盤等都成為某種專門的技術性操作相對來講比較容易做到但是把校勘標點工作僅僅作為使用方便的一個因素看待未免有點本末倒置作為歷史文獻資料第一要求是文本的真實可靠準確無誤這是其研究價值的核心所在沒有精審周密的校勘就無法保證其準確可靠大正藏的毛病就出在這里新版大藏經的編纂質量的關鍵和工作的困難首先在於校勘校勘之難不在於羅列異同而在於勘定是非沒有豐厚的修養淵博的學識和虔敬的作風勘定是非就無從談起不能勘定是非也就無法為讀者提供一個準確可靠通暢易讀的本子現在謹以著名佛教史籍高僧傳中的部分傳文為例看看文本的準確無誤是多麼重要而大正藏在這一部分中的訛誤又多麼令人遺憾隨機抽樣姑以卷二的鳩摩羅什傳為例西域諸國咸伏什神俊每年講説諸王皆長跪座側令什踐而登焉其見重如此文中每年講説的年字磧砂藏本弘教藏本金陵刻經處本出三藏記集本晉書法苑珠林開元釋教録均作至年乃因至之殘壞而誤排每至講説與每年講説其頻次其程度是頗有差異的苻堅謂呂光曰夫帝王應天而治以豫愛蒼生為本豈貪其他而伐之乎其中豫愛蒼生的豫字磧砂藏作子子愛是個復音詞謂愛之深切有愛民如子之意漢書匡衡傳上疏曰陛下聖德天覆子愛海內可作書證今誤作人稱代詞則索然寡味了其他乃其地之誤係明顯的形近而誤貪其地而伐之為屢見不鮮的歷史教訓貪其他又怎麼講呢皆潛龍出遊豕妖表異其中皆字磧砂藏出三藏記集作比日比日連日也傳文前邊已敘及連日來的怪異大正藏誤將豎排的兩個字合成一個字了宜克棋修德以答天戒克棋磧砂藏本晉書出三藏記集作克己克己修德詞義連貫克棋則講不通棋乃涉下文與什博戲殺棋曰而誤天戒磧砂藏本作天威宋元明三古本同磧砂藏戒恐係因威字殘壞而誤排什為人神情朗徹傲岸出群應機領會鮮有倫匹者篤性仁厚泛愛為心虛己善誘終日無倦鮮有倫匹磧砂藏本宋元明三古本出三藏記集作鮮有其匹者字磧砂藏本宋元明三古本金陵刻經處本出三藏記集開元釋教録弘教藏本均作且字鮮有其匹詞義顯豁易懂鮮有倫匹則較少見這裏講鳩摩羅什又聰明又仁厚且字作為並列復句的連詞用在此處十分恰當如誤作者字就將並列的語氣割斷把一個關聯緊密的復句切割成兩個單句了類似的訛脫衍倒較多無須特意挑選限於篇幅不多舉例筆者年前後曾以多種版本的大藏經就高僧傳進行比勘校訂特別注意和湯用彤老先生用作底本的大正藏作比對研究結果證實大正藏裏高僧傳的文本確實不大靠得住但是到底哪幾種大藏經的版本文字比較準確無誤真實可靠呢哪一版本的校勘質量更高一些呢因個人雜事繁冗精力有限我不久就轉到完成其他工作任務上去了事情雖沒做完但目標還是明確的我始終希望在大藏經的編纂研究方面人們能抓住核心的文獻價值開展工作提高校勘水平為科學有效地編纂一部富有時代特點總結已有成果文字準確可靠篇目周全完備校勘精審標點謹嚴而且方便實用的新版漢文大藏經而努力奮鬥我目前的一點粗淺認識就權當是拋磚引玉吧
